name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check python/
      - run: uv run ruff format --check python/

  # ── C++ build + 18 GoogleTests ────────────────────────────────────────────
  cpp-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0135=NEW \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j4

      - name: Run GoogleTests (18 tests)
        run: ctest --test-dir build --output-on-failure -V

  # ── Python fault-injection tests (requires compiled binary) ───────────────
  python-fault-injection:
    runs-on: ubuntu-latest
    needs: cpp-build-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Build gateway daemon
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0135=NEW \
            -DBUILD_TESTING=OFF
          cmake --build build --target gateway_daemon -j4

      - name: Install Python deps
        run: uv sync --frozen

      - name: Run fault-injection tests (6 tests)
        env:
          GATEWAY_BIN: ${{ github.workspace }}/build/gateway_daemon
        run: uv run pytest python/ -v --tb=short

  # ── ARM64 cross-compile ────────────────────────────────────────────────────
  arm64-cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cross-compile gateway_core (no tests)
        run: |
          cmake -B build-arm64 -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0135=NEW \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DBUILD_TESTING=OFF
          cmake --build build-arm64 --target gateway_core -j4

  # ── Embedded CI/CD Pipeline ────────────────────────────────────────────────
  embedded-cicd-native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Native
        run: cd embedded_cicd_pipeline && docker compose run build-native

  embedded-cicd-static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static Analysis
        run: cd embedded_cicd_pipeline && docker compose run static-analysis

  embedded-cicd-coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Coverage Report
        run: cd embedded_cicd_pipeline && docker build -t embedded-cicd-image . && docker run --rm embedded-cicd-image bash scripts/generate_coverage_report.sh

  embedded-cicd-arm-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ARM Cross
        run: cd embedded_cicd_pipeline && docker compose run build-arm
