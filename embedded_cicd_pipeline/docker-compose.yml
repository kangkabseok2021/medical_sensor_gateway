version: '3.8'

services:
  build-native:
    build: .
    volumes:
      - .:/workspace
    command: bash -c "mkdir -p build && cmake -B build -DCOVERAGE=ON -DCMAKE_BUILD_TYPE=Debug && cmake --build build && cd build && ctest --output-on-failure"

  build-arm:
    build: .
    volumes:
      - .:/workspace
    command: bash -c "cmake -B build/arm -DCMAKE_TOOLCHAIN_FILE=cmake/arm-toolchain.cmake -DBUILD_SHARED_LIBS=OFF && cmake --build build/arm && qemu-arm-static build/arm/test_pid && qemu-arm-static build/arm/test_hal && qemu-arm-static build/arm/test_integration"

  static-analysis:
    build: .
    volumes:
      - .:/workspace
    command: bash -c "cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON && clang-tidy --warnings-as-errors='*' $$(find src/ include/ -name '*.cpp' -o -name '*.h') -p build && bash scripts/run_cppcheck.sh && bash scripts/check_complexity.sh"
